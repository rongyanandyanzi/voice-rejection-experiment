services:
  - type: web
    name: voice-rejection-experiment
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_TOKEN
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
    disk:
      name: experiment-data
      mountPath: /var/data
      sizeGB: 1
